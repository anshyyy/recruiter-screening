# Local PostgreSQL for development. From repo root:
#   docker compose up -d postgres
# Connection from host: localhost:5433 -> container 5432 (see apps/api/.env).
# Host 5433 avoids clashing with a local Postgres already bound to 5432.
services:
  postgres:
    image: postgres:16-alpine
    container_name: recruiter-screening-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: recruiter
      POSTGRES_PASSWORD: recruiter_dev_password
      POSTGRES_DB: recruiter_screening
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recruiter -d recruiter_screening"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
